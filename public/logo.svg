<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E4362C"/>
      <stop offset="0.55" stop-color="#C42B22"/>
      <stop offset="1" stop-color="#8E1B14"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD54A"/>
      <stop offset="1" stop-color="#F7A31C"/>
    </linearGradient>
  </defs>

  <!-- outer truck-art frame -->
  <rect x="8" y="8" width="496" height="496" rx="96" fill="url(#bg)"/>
  <rect x="26" y="26" width="460" height="460" rx="82" fill="none" stroke="#FFD54A" stroke-width="10"/>
  <rect x="44" y="44" width="424" height="424" rx="70" fill="none" stroke="#0E8388" stroke-width="8"/>

  <!-- corner dots -->
  <g fill="#FFD54A">
    <circle cx="86" cy="86" r="10"/><circle cx="426" cy="86" r="10"/>
    <circle cx="86" cy="426" r="10"/><circle cx="426" cy="426" r="10"/>
  </g>
  <g fill="#7BD1D4">
    <circle cx="256" cy="62" r="8"/><circle cx="256" cy="450" r="8"/>
    <circle cx="62" cy="256" r="8"/><circle cx="450" cy="256" r="8"/>
  </g>

  <!-- sun -->
  <g>
    <g stroke="#FFD54A" stroke-width="12" stroke-linecap="round">
      <line x1="256" y1="96" x2="256" y2="126"/>
      <line x1="352" y1="136" x2="332" y2="158"/>
      <line x1="160" y1="136" x2="180" y2="158"/>
    </g>
    <circle cx="256" cy="204" r="66" fill="url(#sun)" stroke="#8E1B14" stroke-width="6"/>
  </g>

  <!-- wind swirls -->
  <g fill="none" stroke="#FFF7EC" stroke-width="14" stroke-linecap="round">
    <path d="M110 296 q80 -34 168 0 t124 0"/>
    <path d="M140 336 q66 -26 132 0 t110 0" stroke-width="11" opacity="0.85"/>
  </g>

  <!-- mess name -->
  <text x="256" y="404" text-anchor="middle"
    font-family="Outfit, Arial, sans-serif" letter-spacing="4"
    font-size="52" font-weight="800" fill="#FFF7EC">HAOWA</text>
  <text x="256" y="456" text-anchor="middle"
    font-family="Outfit, Arial, sans-serif" letter-spacing="6"
    font-size="42" font-weight="700" fill="#FFD54A">BHOBON</text>
</svg>
